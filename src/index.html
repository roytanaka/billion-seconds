<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Billion Seconds Counter</title>
    <script type="module" src="/main.js"></script>
  </head>
  <body>
    <main>
      <div
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title"
        aria-hidden="false"
      >
        <div class="modal-centering">
          <div class="modal-dialog">
            <div>
              <h1 id="modal-title">Billionth Second Counter</h1>
              <hr />
              <h2>Enter your birthday and time of birth</h2>
            </div>
            <div class="modal-body">
              <div class="date-selectors">
                <div class="date-entry">
                  <div class="select-group">
                    <label for="modalYear">Year</label>
                    <span class="select-wrapper">
                      <select
                        class="custom-dropdown"
                        name="modalYear"
                        id="modalYear"
                        title="choose year"
                        required
                      >
                      </select>
                    </span>
                  </div>
                  <div class="select-group">
                    <label for="modalMonth">Month</label>
                    <span class="select-wrapper">
                      <select
                        class="custom-dropdown"
                        name="modalMonth"
                        id="modalMonth"
                        title="choose month"
                        required
                      >
                      </select>
                    </span>
                  </div>
                  <div class="select-group">
                    <label for="modalDate">Day</label>
                    <span class="select-wrapper">
                      <select
                        class="custom-dropdown"
                        name="modalDate"
                        id="modalDate"
                        title="choose date"
                        required
                      >
                      </select>
                    </span>
                  </div>
                </div>
                <span class="time-text">&nbsp;/&nbsp;</span>
                <div class="time-entry">
                  <div class="select-group">
                    <label for="modalHour">Hours</label>
                    <span class="select-wrapper">
                      <select
                        class="custom-dropdown"
                        name="modalHour"
                        id="modalHour"
                        title="choose hour"
                        required
                      >
                      </select>
                    </span>
                  </div>
                  <span class="time-text">:</span>
                  <div class="select-group">
                    <label for="modalMinute">Min</label>
                    <span class="select-wrapper">
                      <select
                        class="custom-dropdown"
                        name="modalMinute"
                        id="modalMinute"
                        title="choose minute"
                        required
                      >
                      </select>
                    </span>
                  </div>
                </div>
              </div>
            </div>
            <div
              class="modal-error"
              id="modal-error"
              aria-live="assertive"
              aria-hidden="true"
            >
              Oops. Please select a valid date.
            </div>
            <div class="modal-footer">
              <button
                type="button"
                id="getSeconds"
                aria-describedby="modal-error"
              >Go</button>
            </div>
          </div>
        </div>
      </div>
      <div
        id="seconds"
        aria-hidden="true"
        aria-live="polite"
        aria-atomic="true"
        tabindex="-1"
      ></div>
    </main>
  </body>
</html>
